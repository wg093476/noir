<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOIR</title>

<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    width:90%;
    max-width:1100px;
    text-align:center;
    animation:fadeIn .8s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.logo{
    font-family:'Pixelify Sans',sans-serif;
    font-size:64px;
    letter-spacing:14px;
    margin-bottom:55px;
    text-shadow:
    0 0 8px rgba(255,255,255,.15),
    0 0 20px rgba(255,255,255,.05);
    user-select:none;
}

.search-wrap{
    position:relative;
    max-width:950px;
    margin:0 auto;
}

input{
    width:100%;
    background:transparent;
    border:none;
    border-top:1px solid rgba(255,255,255,.15);
    border-bottom:1px solid rgba(255,255,255,.15);
    color:white;
    text-align:center;
    font-size:30px;
    padding:28px 20px;
    outline:none;
    font-family:'JetBrains Mono', monospace;
}

.placeholder{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    color:#8a8a8a;
    white-space:nowrap;
    pointer-events:none;
    font-size:30px;
    font-family:'JetBrains Mono', monospace;
}

.cursor{
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">
        NOIR
    </div>

    <div class="search-wrap">

        <div class="placeholder" id="placeholder">
            <span id="typewriter"></span><span class="cursor">_</span>
        </div>

        <input
            id="search"
            autocomplete="off"
            spellcheck="false"
        >

    </div>

</div>

<script>

const phrases = [
    "amazon $100",
    "steam $50",
    "fortnite $20",
    "roblox $25",
    "xbox $50",
    "playstation $100",
    "apple $100"
];

const typewriter =
document.getElementById("typewriter");

const input =
document.getElementById("search");

let phraseIndex = 0;
let charIndex = 0;
let deleting = false;

function animateText(){

    if(input.value.length > 0){
        typewriter.textContent = "";
        return;
    }

    const current = phrases[phraseIndex];

    if(!deleting){

        typewriter.textContent =
        current.substring(0,charIndex + 1);

        charIndex++;

        if(charIndex === current.length){

            deleting = true;

            setTimeout(
                animateText,
                1400
            );

            return;
        }

    }else{

        typewriter.textContent =
        current.substring(0,charIndex - 1);

        charIndex--;

        if(charIndex === 0){

            deleting = false;

            phraseIndex =
            (phraseIndex + 1) %
            phrases.length;
        }

    }

    setTimeout(
        animateText,
        deleting ? 45 : 85
    );

}

animateText();

input.addEventListener("input",()=>{

    const placeholder =
    document.getElementById("placeholder");

    if(input.value.length > 0){
        placeholder.style.display = "none";
    }else{
        placeholder.style.display = "block";
    }

});

input.addEventListener("keydown",(e)=>{

    if(e.key === "Enter"){

        const query =
        input.value.trim();

        if(!query) return;

        const amount =
        query.match(/\d+/)?.[0] || "20";

        const imageName =
query
.replace(/\$/g,"")
.replace(/\d+/g,"")
.trim()
.toLowerCase();

const imagePath = `images/${imageName}.jpg`;

        document.body.innerHTML = `

        <div style="
        background:black;
        color:white;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        font-family:'JetBrains Mono', monospace;
        ">

            <div style="
            text-align:center;
            border:1px solid rgba(255,255,255,.15);
            padding:50px;
            min-width:350px;
            ">

               <img
src="${imagePath}"
style="
width:320px;
max-width:100%;
border-radius:8px;
margin-bottom:25px;
"
onerror="this.style.display='none'"
>

<div style="
font-size:42px;
margin-bottom:20px;
">
${brand}
</div>

                <div style="
                font-size:30px;
                margin-bottom:20px;
                ">
                $${amount}
                </div>

                <div style="
                color:#777;
                margin-bottom:35px;
                ">
                instant delivery
                </div>

                <div style="
display:flex;
flex-direction:column;
gap:10px;
width:260px;
margin:auto;
">

<button style="
padding:12px;
background:white;
color:black;
border:none;
cursor:pointer;
font-family:'JetBrains Mono', monospace;
">
Apple Pay
</button>

<button style="
padding:12px;
background:#111;
color:white;
border:1px solid rgba(255,255,255,.15);
cursor:pointer;
font-family:'JetBrains Mono', monospace;
">
Google Pay
</button>

<button style="
padding:12px;
background:#111;
color:white;
border:1px solid rgba(255,255,255,.15);
cursor:pointer;
font-family:'JetBrains Mono', monospace;
">
Card
</button>

<button style="
padding:12px;
background:#111;
color:white;
border:1px solid rgba(255,255,255,.15);
cursor:pointer;
font-family:'JetBrains Mono', monospace;
">
Crypto
</button>

</div>

            </div>

        </div>

        `;

    }

});

</script>

</body>
</html>
